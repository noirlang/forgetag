name: Build and release commit

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  metadata:
    name: Commit metadata
    runs-on: ubuntu-24.04
    outputs:
      asset_suffix: ${{ steps.commit.outputs.asset_suffix }}
      release_title: ${{ steps.commit.outputs.release_title }}
      short_sha: ${{ steps.commit.outputs.short_sha }}
      tag: ${{ steps.commit.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - id: commit
        shell: bash
        run: |
          set -euo pipefail
          subject="$(git log -1 --pretty=%s)"
          short_sha="${GITHUB_SHA:0:12}"
          ascii_subject="$(printf '%s' "$subject" \
            | iconv -f UTF-8 -t ASCII//TRANSLIT 2>/dev/null || true)"
          slug="$(printf '%s' "$ascii_subject" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g; s/-+/-/g' \
            | cut -c1-56)"
          if [[ -z "$slug" ]]; then
            slug="commit"
          fi
          echo "asset_suffix=${slug}-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "release_title=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "tag=commit-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  quality:
    name: Tests and static checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: TypeScript check
        run: npm run build
      - name: Run Rust tests
        run: cargo test --locked

  linux-packages:
    name: AppImage, DEB, RPM and Arch
    needs:
      - metadata
      - quality
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Build in Debian 12
        shell: bash
        run: |
          docker run --rm \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work \
            debian:12-slim \
            bash ./scripts/ci-build-linux.sh
      - name: Name Linux assets from commit
        env:
          ASSET_SUFFIX: ${{ needs.metadata.outputs.asset_suffix }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          # AppImage
          appimage=$(find target/release/bundle/appimage -maxdepth 1 -name "*.AppImage" ! -name "*.tauri" | head -n 1)
          if [[ -n "$appimage" ]]; then
            cp "$appimage" "release-assets/forgetag-${ASSET_SUFFIX}-linux-x64.AppImage"
          fi
          # DEB
          deb=$(find target/release/bundle/deb -maxdepth 1 -name "*.deb" | head -n 1)
          if [[ -n "$deb" ]]; then
            cp "$deb" "release-assets/forgetag-${ASSET_SUFFIX}-linux-x64.deb"
          fi
          # RPM
          rpm=$(find target/release/bundle/rpm -maxdepth 1 -name "*.rpm" | head -n 1)
          if [[ -n "$rpm" ]]; then
            cp "$rpm" "release-assets/forgetag-${ASSET_SUFFIX}-linux-x64.rpm"
          fi
          # Arch Linux
          arch=$(find target/release/bundle/arch -maxdepth 1 -name "*.pkg.tar.zst" | head -n 1)
          if [[ -n "$arch" ]]; then
            cp "$arch" "release-assets/forgetag-${ASSET_SUFFIX}-linux-x64.pkg.tar.zst"
          fi
          ls -la release-assets/
      - name: Upload Linux packages
        uses: actions/upload-artifact@v7
        with:
          name: linux-packages-${{ needs.metadata.outputs.short_sha }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 30

  windows-msi:
    name: Windows MSI
    needs:
      - metadata
      - quality
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Install WiX Toolset
        shell: pwsh
        run: |
          $Archive = Join-Path $env:RUNNER_TEMP "wix314-binaries.zip"
          $WixDir = Join-Path $env:RUNNER_TEMP "wix314"
          Invoke-WebRequest `
            -Uri "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip" `
            -OutFile $Archive
          Expand-Archive $Archive -DestinationPath $WixDir -Force
          $WixDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Build MSI
        run: npx tauri build --config src-tauri/tauri.conf.json --bundles msi
      - name: Name Windows asset from commit
        env:
          ASSET_SUFFIX: ${{ needs.metadata.outputs.asset_suffix }}
        shell: pwsh
        run: |
          New-Item release-assets -ItemType Directory -Force | Out-Null
          $msi = Get-ChildItem target/release/bundle/msi/*.msi | Select-Object -First 1
          if ($msi) {
            Copy-Item $msi.FullName "release-assets\forgetag-$env:ASSET_SUFFIX-windows-x64.msi"
          }
      - name: Upload Windows MSI
        uses: actions/upload-artifact@v7
        with:
          name: windows-msi-${{ needs.metadata.outputs.short_sha }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish commit prerelease
    if: github.event_name == 'push'
    needs:
      - metadata
      - linux-packages
      - windows-msi
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download packages
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true
      - name: Create checksums and release notes
        env:
          ASSET_SUFFIX: ${{ needs.metadata.outputs.asset_suffix }}
          RELEASE_TITLE: ${{ needs.metadata.outputs.release_title }}
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum forgetag-* \
            > "forgetag-${ASSET_SUFFIX}-SHA256SUMS.txt"
          cd ..
          cat > release-notes.md <<EOF
          Automated development release for **${RELEASE_TITLE}**.

          Built from \`${GITHUB_SHA}\` on \`${GITHUB_REF_NAME}\`.

          Packages:
          - Linux AppImage
          - Debian/Ubuntu DEB
          - Fedora/RHEL RPM
          - Arch Linux package (pkg.tar.zst)
          - Windows x64 MSI

          This is an unsigned prerelease generated from a development commit.
          EOF
      - name: Create or update commit release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
          RELEASE_TITLE: ${{ needs.metadata.outputs.release_title }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_TITLE" \
              --notes-file release-notes.md \
              --prerelease
            gh release upload "$RELEASE_TAG" release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TITLE" \
              --notes-file release-notes.md \
              --prerelease
          fi
